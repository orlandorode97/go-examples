version: "3.9"

services:
  # ─── TimescaleDB ──────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-metrics
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metricsdb
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data # persist data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # auto-run on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metricsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  timescaledb_data:
