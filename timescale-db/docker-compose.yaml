version: "3.9"

services:
  # ─── TimescaleDB ──────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sensordb
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data # persist data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # auto-run on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sensordb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Go API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api
    restart: unless-stopped
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sensordb
      PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
